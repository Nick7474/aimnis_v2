/* ─── QUESTION CARD ──────────────────────────────── */
const QuestionCard = ({q, catColor, answers, onAnswer}) => {
  const [showOther, setShowOther] = useState(false);
  const [otherText, setOtherText] = useState('');
  const ans = answers[q.id] || [];

  const toggle = (opt) => {
    if(q.multi){
      const next = ans.includes(opt)?ans.filter(a=>a!==opt):[...ans,opt];
      onAnswer(q.id, next);
    } else {
      onAnswer(q.id, ans[0]===opt?[]:[opt]);
    }
  };

  const submitOther = () => {
    if(!otherText.trim()) return;
    const val = `기타: ${otherText.trim()}`;
    if(q.multi){
      const filtered = ans.filter(a=>!a.startsWith('기타:'));
      onAnswer(q.id,[...filtered, val]);
    } else {
      onAnswer(q.id,[val]);
    }
    setShowOther(false);
    setOtherText('');
  };

  const isAnswered = ans.length > 0;

  return (
    <div style={{
      background:'var(--s1)',border:`1px solid ${isAnswered?'oklch(60% 0.20 285 / .3)':'var(--border)'}`,
      borderRadius:14,padding:'20px 20px 16px',
      transition:'all .2s',
      boxShadow:isAnswered?'0 0 0 1px oklch(60% 0.20 285 / .1)':'none',
    }}>
      {/* Question label */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,marginBottom:14}}>
        <p style={{fontSize:13,fontWeight:600,color:'var(--t1)',lineHeight:1.5,flex:1}}>{q.label}</p>
        <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
          {q.multi && (
            <span style={{
              fontSize:9,fontWeight:700,letterSpacing:'0.06em',padding:'2px 7px',
              borderRadius:4,border:`1px solid ${catColor}44`,background:`${catColor}12`,
              color:catColor,textTransform:'uppercase',
            }}>복수 선택</span>
          )}
          {isAnswered && (
            <svg width={16} height={16} viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7" fill="oklch(65% 0.16 145 / .2)" stroke="oklch(65% 0.16 145 / .6)" strokeWidth="1.2"/>
              <polyline points="4.5,8 7,10.5 11.5,5.5" stroke="var(--green)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>

          }}>✕</button>
        </div>
      ))}
    </div>
  );
};

/* ─── CATEGORY SECTION ───────────────────────────── */
const CategorySection = ({cat, answers, onAnswer, expanded, onToggle}) => {
  const total = cat.questions.length;

  const pct = Math.round(done/total*100);

  return (
    <div style={{marginBottom:8}}>

        width:'100%',display:'flex',alignItems:'center',gap:12,

        }}>{cat.icon}</div>

        <div style={{flex:1,textAlign:'left'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>{cat.label}</span>
            <span style={{fontSize:10,color:'var(--t4)',fontFamily:'var(--mono)'}}>{done}/{total}</span>
          </div>
          {/* Progress bar */}
          <div style={{marginTop:5,height:3,borderRadius:2,background:'var(--s4)',width:160}}>
            <div style={{
              height:'100%',borderRadius:2,
              background:pct===100?'var(--green)':cat.color,
              width:`${pct}%`,transition:'width .3s ease',
            }}/>
          </div>
        </div>

        {pct===100 && (
          <svg width={18} height={18} viewBox="0 0 18 18" fill="none" style={{flexShrink:0}}>
            <circle cx="9" cy="9" r="8" fill="oklch(65% 0.16 145 / .2)" stroke="var(--green)" strokeWidth="1.5"/>
            <polyline points="5,9 8,12 13,6" stroke="var(--green)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}

        <svg width={14} height={14} viewBox="0 0 14 14" fill="none" style={{
          flexShrink:0,transition:'transform .2s',transform:expanded?'rotate(180deg)':'none',
        }}>
          <polyline points="3,5 7,9 11,5" stroke="var(--t4)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>

      {/* Questions grid */}
      {expanded && (
        <div style={{
          background:'var(--s1)',borderRadius:'0 0 12px 12px',
          padding:'16px',
          display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,
          border:'1px solid var(--border)',borderTop:'none',
          animation:'fadeIn .2s ease both',

            <QuestionCard key={q.id} q={q} catColor={cat.color}
              answers={answers} onAnswer={onAnswer}/>
          ))}
        </div>
      )}
    </div>
  );
};

/* ─── MAIN APP ────────────────────────────────────── */
const App = () => {
  const [answers, setAnswers] = useState({});
  const [expanded, setExpanded] = useState({'env':true,'cctv':false,'threat':false,'alarm':false,'data':false,'operation':false});
  const [tweaks,setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen,setTweaksOpen] = useState(false);

  const totalQ = CATEGORIES.reduce((s,c)=>s+c.questions.length,0);
  const doneQ = CATEGORIES.reduce((s,c)=>s+c.questions.filter(q=>(answers[q.id]||[]).length>0).length,0);

  const onAnswer = useCallback((qid,val)=>{
    setAnswers(p=>({...p,[qid]:val}));
  },[]);

  const toggleCat = useCallback((id)=>{
    setExpanded(p=>({...p,[id]:!p[id]}));
  },[]);

  // Auto-expand next unanswered category
  useEffect(()=>{
    const firstDone = CATEGORIES.find(c=>c.questions.every(q=>(answers[q.id]||[]).length>0));
    if(firstDone){
      const idx = CATEGORIES.findIndex(c=>c.id===firstDone.id);
      const next = CATEGORIES[idx+1];
      if(next&&!expanded[next.id]){
        setExpanded(p=>({...p,[next.id]:true}));
      }
    }
  },[answers]);

  useEffect(()=>{
    document.documentElement.style.setProperty('--primary',`oklch(60% 0.20 ${tweaks.accentHue})`);
  },[tweaks.accentHue]);

  useEffect(()=>{
    const handler=e=>{
      if(e.data?.type==='__activate_edit_mode') setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',handler);
  },[]);

  const sessions = [
    {iconId:'shield',name:'AIM GUARD 설정',sub:'현재 진행 중',active:true},
    {iconId:'zap',name:'AIM GUARD 작업 설정',sub:'2일 전',active:false},
    {iconId:'leaf',name:'스타트업 사례 설명',sub:'5일 전',active:false},
  ];

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
      <div style={{position:'fixed',inset:0,zIndex:0,pointerEvents:'none',opacity:.03,
        backgroundImage:`linear-gradient(oklch(100% 0 0 / .025) 1px,transparent 1px),linear-gradient(90deg,oklch(100% 0 0 / .025) 1px,transparent 1px)`,
        backgroundSize:'60px 60px'}}/>

      <TopBar doneQ={doneQ} totalQ={totalQ}/>

      <div style={{flex:1,display:'flex',minHeight:0,position:'relative',zIndex:1}}>
        <LeftPanel sessions={sessions} activeSession={0}/>

        {/* Center — Spec Board */}
        <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,background:'var(--bg)'}}>
          {/* Board header */}
          <div style={{
            padding:'20px 28px 14px',borderBottom:'1px solid var(--border)',
            background:'var(--s1)',flexShrink:0,
          }}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                  <h1 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.02em'}}>Spec Board</h1>
                  <span style={{
                    fontSize:10,padding:'3px 9px',borderRadius:5,
                    background:'oklch(60% 0.20 285 / .12)',border:'1px solid oklch(60% 0.20 285 / .3)',
                    color:'var(--primary)',fontWeight:600,letterSpacing:'0.04em',
                  }}>AIM GUARD v1.0</span>
                </div>
                <p style={{fontSize:12,color:'var(--t3)',lineHeight:1.55}}>
                  현장 환경에 맞는 솔루션을 구성합니다. 각 항목에 답변하시면 AI가 최적 설정을 자동 생성합니다.
                </p>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {/* Category filter chips */}
                <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
                  {CATEGORIES.map(c=>{
                    const done=c.questions.filter(q=>(answers[q.id]||[]).length>0).length;
                    const pct=Math.round(done/c.questions.length*100);
                    return (
                      <button key={c.id} onClick={()=>toggleCat(c.id)} style={{
                        display:'flex',alignItems:'center',gap:5,padding:'5px 11px',
                        borderRadius:7,border:`1px solid ${expanded[c.id]?c.color+'55':'var(--border)'}`,
                        background:expanded[c.id]?`${c.color}12`:'transparent',
                        color:expanded[c.id]?'var(--t1)':'var(--t3)',
                        fontSize:11,fontFamily:'var(--font)',fontWeight:expanded[c.id]?600:400,
                        cursor:'pointer',transition:'all .15s',
                      }}>
                        <span style={{fontSize:12}}>{c.icon}</span>
                        {c.label}
                        {pct===100&&<svg width={10} height={10} viewBox="0 0 10 10" fill="none">
                          <circle cx="5" cy="5" r="4.5" fill="none" stroke="var(--green)" strokeWidth="1.2"/>
                          <polyline points="2.5,5 4.5,7 7.5,3.5" stroke="var(--green)" strokeWidth="1.2" strokeLinecap="round"/>
                        </svg>}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>

          {/* Scrollable questions */}
          <div style={{flex:1,overflowY:'auto',padding:'20px 28px 40px'}}>
            {CATEGORIES.map(cat=>(
              <CategorySection key={cat.id} cat={cat}
                answers={answers} onAnswer={onAnswer}
                expanded={!!expanded[cat.id]} onToggle={()=>toggleCat(cat.id)}/>
            ))}

            {/* Completion banner */}
            {doneQ===totalQ && (
              <div style={{
                marginTop:16,padding:'20px 24px',
                background:'oklch(65% 0.16 145 / .08)',
                border:'1px solid oklch(65% 0.16 145 / .3)',
                borderRadius:14,display:'flex',alignItems:'center',gap:16,
                animation:'fadeUp .4s ease both',
              }}>
                <div style={{
                  width:40,height:40,borderRadius:12,
                  background:'oklch(65% 0.16 145 / .2)',border:'1px solid oklch(65% 0.16 145 / .4)',
                  display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,
                }}>✓</div>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--green)',marginBottom:3}}>모든 항목 답변 완료</div>
                  <div style={{fontSize:12,color:'var(--t3)'}}>우측 패널에서 Magic Setup을 실행해 솔루션 설정을 자동 생성하세요.</div>
                </div>
              </div>
            )}
          </div>
        </div>

        <RightPanel answers={answers} totalQ={totalQ} doneQ={doneQ}/>
      </div>

      {/* Tweaks */}
      {tweaksOpen && (
        <div style={{
          position:'fixed',bottom:24,right:24,zIndex:9999,
          background:'oklch(14% 0.020 275 / .95)',
          border:'1px solid var(--border2)',borderRadius:16,
          backdropFilter:'blur(20px)',padding:20,width:230,
          boxShadow:'0 24px 60px oklch(0% 0 0 / .5)',
          animation:'fadeUp .25s ease both',
        }}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--t3)',marginBottom:16}}>Tweaks</div>
          <div>
            <div style={{fontSize:11,color:'var(--t3)',marginBottom:8}}>액센트 색상</div>
            <div style={{display:'flex',gap:7}}>
              {['285','210','250','145'].map(h=>(
                <button key={h} onClick={()=>{const n={...tweaks,accentHue:h};setTweaks(n);window.parent.postMessage({type:'__edit_mode_set_keys',edits:n},'*');}} style={{
                  flex:1,height:26,borderRadius:6,border:'none',cursor:'pointer',
                  background:`oklch(58% 0.20 ${h})`,
                  outline:tweaks.accentHue===h?'2px solid white':'none',outlineOffset:2,transition:'all .15s',
                }}/>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Back link */}
      <a href="AIMNIS Redesign.html" style={{
        position:'fixed',bottom:16,left:236,zIndex:9999,
        fontSize:10,color:'var(--t4)',textDecoration:'none',
        padding:'5px 10px',background:'var(--s2)',
        border:'1px solid var(--border)',borderRadius:6,fontFamily:'var(--mono)',
      }}>← 메인으로</a>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
