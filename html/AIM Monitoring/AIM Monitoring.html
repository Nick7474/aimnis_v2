<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIM Monitoring — AIoT 복합 계측 모니터링</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b13; --s1:#0b111c; --s2:#0f1623; --s3:#141d2c; --s4:#1b2536;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.12);
  /* ── Widget design tokens (matched to spec) ── */
  --wbg:linear-gradient(180deg,#0f151f,#0b0f17); --wborder:rgba(255,255,255,.07); --wradius:14px;
  --sel:#3b82f6; /* grid resize accent */
  --blue:#3b82f6; --blueDark:#1d6fe0;
  --t1:#f1f5f9; --t2:#94a3b8; --t3:#64748b; --t4:#475569;
  --font:'Plus Jakarta Sans',sans-serif; --mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--t1);overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#334155}
@keyframes aimPulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes aimUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes aimPop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes aimIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.aim-card-enter{animation:aimPop .35s cubic-bezier(.16,1,.3,1) both}
</style>
</head>
<body>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="18" fill="#0b111c"/>
  <rect x="30" y="30" width="40" height="40" rx="10" fill="#3b82f6" opacity="0.18"/>
  <path d="M30 62 L42 46 L52 54 L62 38 L70 48" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="62" cy="38" r="3" fill="#3b82f6"/>
</svg>
</template>
<div id="root"></div>
<script type="text/babel" src="aim-charts.jsx"></script>
<script type="text/babel" src="aim-widgets.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const Ic = window.AIMIc;
const { C } = window.AIMCharts;
const WIDGETS = window.AIM_WIDGETS;

/* ── nav icons ─────────────────────────── */
const NIC = {
  home:<><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
  dash:<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></>,
  diag:<><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></>,
  env:<><path d="M12 2C8 6 6 9 6 13a6 6 0 0 0 12 0c0-4-2-7-6-11z"/></>,
  worker:<><circle cx="12" cy="7" r="4"/><path d="M5.5 21a8.38 8.38 0 0 1 13 0"/></>,
  bell:<><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
  report:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
  settings:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
  chat:<><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>,
  widget:<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></>,
  edit:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></>,
  save:<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
  expand:<><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>,
  publish:<><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></>,
  monitor:<><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>,
  data:<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>,
  send:<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
  sparkle:<path d="M12 3L13.5 8.5L19 10L13.5 11.5L12 17L10.5 11.5L5 10L10.5 8.5L12 3Z"/>,
  search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
  bellTop:<><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
  chevDown:<polyline points="6 9 12 15 18 9"/>,
  chevLeft:<polyline points="15 18 9 12 15 6"/>,
  plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
  close:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
  drag:<><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></>,
};
const NI = ({n,s=18,c='currentColor',sw=1.8})=>(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{NIC[n]}</svg>);

/* ── AIMNIS logo ─────────────────────────── */
const Logo = ({size=26})=>(
  <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
    <defs><linearGradient id="aimLg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#FF6B35"/><stop offset="50%" stopColor="#C850C0"/><stop offset="100%" stopColor="#4158D0"/></linearGradient></defs>
    <circle cx="20" cy="20" r="18" fill="url(#aimLg)" opacity=".15"/>
    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#aimLg)" strokeWidth="1.5"/>
    <path d="M12 28L20 12L28 28" stroke="url(#aimLg)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    <path d="M14.5 22.5H25.5" stroke="url(#aimLg)" strokeWidth="2" strokeLinecap="round"/>
    <circle cx="20" cy="20" r="3" fill="url(#aimLg)" opacity=".8"/>
  </svg>
);

/* ── TOP BAR ─────────────────────────────── */
const TopBar = ()=>{
  const [view,setView] = useState('monitor');
  const [nav,setNav] = useState('editor');
  return (
    <div style={{height:56,display:'flex',alignItems:'center',background:'var(--s1)',borderBottom:'1px solid var(--border)',flexShrink:0,padding:'0 18px',position:'relative',zIndex:30,gap:16}}>
      <div style={{display:'flex',alignItems:'center',gap:11}}>
        <Logo size={26}/>
        <span style={{fontWeight:800,fontSize:16,letterSpacing:'0.02em'}}>AIMNIS</span>
        <span style={{color:'var(--t4)',fontSize:18,fontWeight:300}}>/</span>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <NI n="diag" s={15} c="var(--t2)" sw={2}/>
          <span style={{fontSize:14,fontWeight:600,color:'var(--t2)'}}>AIM Monitoring</span>
        </div>
      </div>

      {/* monitor / data tabs */}
      <div style={{display:'flex',gap:3,background:'var(--s3)',borderRadius:9,padding:3,border:'1px solid var(--border)'}}>
        {[['monitor','monitor','모니터'],['data','data','데이터 매핑']].map(([id,ic,l])=>(
          <button key={id} onClick={()=>setView(id)} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 13px',borderRadius:7,border:'none',cursor:'pointer',
            background:view===id?'var(--s1)':'transparent',color:view===id?'var(--t1)':'var(--t3)',
            fontSize:12.5,fontFamily:'var(--font)',fontWeight:view===id?600:400,transition:'all .15s'}}>
            <NI n={ic} s={14} c={view===id?'var(--blue)':'var(--t3)'} sw={1.9}/>{l}
          </button>
        ))}
      </div>

      <div style={{flex:1}}/>

      {/* center nav */}
      <div style={{display:'flex',gap:2,position:'absolute',left:'50%',transform:'translateX(-50%)'}}>
        {[['home','home','홈'],['editor','dash','에디터'],['project','report','프로젝트'],['aim','diag','AIM Monitoring']].map(([id,ic,l])=>(
          <button key={id} onClick={()=>setNav(id)} style={{display:'flex',alignItems:'center',gap:7,padding:'8px 16px',borderRadius:9,border:'none',cursor:'pointer',
            background:nav===id?'rgba(59,130,246,.12)':'transparent',color:nav===id?'var(--blue)':'var(--t3)',
            fontSize:13,fontFamily:'var(--font)',fontWeight:nav===id?700:500,transition:'all .15s',
            borderBottom:nav===id?'2px solid var(--blue)':'2px solid transparent'}}>
            <NI n={ic} s={15} c={nav===id?'var(--blue)':'var(--t3)'} sw={2}/>{l}
          </button>
        ))}
      </div>

      <div style={{flex:1}}/>

      {/* actions */}
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        {[['edit','편집'],['save','저장'],['expand','확대']].map(([ic,l])=>(
          <button key={ic} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 13px',borderRadius:8,border:'1px solid var(--border2)',background:'var(--s2)',cursor:'pointer',color:'var(--t2)',fontSize:12.5,fontFamily:'var(--font)',fontWeight:500}}>
            <NI n={ic} s={13} c="var(--t2)" sw={1.9}/>{l}
          </button>
        ))}
        <button style={{display:'flex',alignItems:'center',gap:7,padding:'8px 16px',borderRadius:8,border:'none',cursor:'pointer',color:'#fff',fontSize:12.5,fontFamily:'var(--font)',fontWeight:600,
          background:'linear-gradient(135deg,#6366f1,#a855f7)',boxShadow:'0 2px 12px rgba(124,92,237,.4)'}}>
          <NI n="publish" s={13} c="#fff" sw={2}/>퍼블리시
        </button>
      </div>
    </div>
  );
};

/* ── LEFT ASSISTANT PANEL ────────────────── */
const LeftPanel = ({ onAddWidget, usedIds })=>{
  const [tab,setTab] = useState('widget');
  const [q,setQ] = useState('');
  const [msgs,setMsgs] = useState([{role:'ai',text:'안녕하세요! AIM Monitoring 어시스턴트입니다. 위젯 추가나 대시보드 구성을 도와드립니다.'}]);
  const [input,setInput] = useState('');
  const [loading,setLoading] = useState(false);
  const chatRef = useRef(null);

  const cats = [...new Set(WIDGETS.map(w=>w.cat))];
  const filtered = WIDGETS.filter(w=> w.name.toLowerCase().includes(q.toLowerCase()) || w.cat.includes(q));

  const send=(t)=>{ const m=(t||input).trim(); if(!m)return; setMsgs(p=>[...p,{role:'user',text:m}]); setInput(''); setLoading(true);
    setTimeout(()=>{ setMsgs(p=>[...p,{role:'ai',text:'요청하신 내용을 분석했습니다. 우측 위젯 탭에서 해당 위젯을 캔버스로 드래그하거나 클릭해 배치할 수 있습니다.'}]); setLoading(false); },1000); };
  useEffect(()=>{ if(chatRef.current) chatRef.current.scrollTop=chatRef.current.scrollHeight; },[msgs,loading]);

  return (
    <div style={{width:268,flexShrink:0,display:'flex',flexDirection:'column',background:'var(--s1)',borderRight:'1px solid var(--border)',height:'100%'}}>
      {/* assistant identity */}
      <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:11,flexShrink:0}}>
        <div style={{width:38,height:38,borderRadius:11,background:'linear-gradient(135deg,#6366f1,#a855f7)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <NI n="sparkle" s={18} c="#fff" sw={0}/>
          <svg width={0} height={0}/>
        </div>
        <div>
          <div style={{fontSize:13.5,fontWeight:700}}>에임이 · AIMI</div>
          <div style={{fontSize:10.5,color:'var(--t3)',marginTop:1}}>AIM Monitoring 어시스턴트</div>
        </div>
      </div>

      {/* tabs */}
      <div style={{display:'flex',gap:4,padding:'10px 12px',flexShrink:0}}>
        {[['chat','chat','채팅'],['widget','widget','위젯']].map(([id,ic,l])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'9px 0',borderRadius:9,border:'none',cursor:'pointer',
            background:tab===id?'rgba(59,130,246,.14)':'var(--s3)',color:tab===id?'var(--blue)':'var(--t3)',
            fontSize:12.5,fontFamily:'var(--font)',fontWeight:tab===id?700:500,transition:'all .15s',
            boxShadow:tab===id?'inset 0 0 0 1px rgba(59,130,246,.35)':'none'}}>
            <NI n={ic} s={14} c={tab===id?'var(--blue)':'var(--t3)'} sw={2}/>{l}
          </button>
        ))}
      </div>

      {/* WIDGET TAB */}
      {tab==='widget' && (
        <>
          <div style={{padding:'0 14px 10px',flexShrink:0}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>위젯 라이브러리</div>
            <div style={{fontSize:10.5,color:'var(--t3)',lineHeight:1.5,marginBottom:10}}>20개 산업계측 기반 위젯입니다. 클릭하면 우측 캔버스에 배치됩니다.</div>
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 11px',background:'var(--s3)',border:'1px solid var(--border)',borderRadius:8}}>
              <NI n="search" s={13} c="var(--t4)" sw={1.8}/>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="위젯 검색..." style={{flex:1,background:'none',border:'none',outline:'none',fontSize:12,color:'var(--t1)',fontFamily:'var(--font)'}}/>
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'0 14px 16px',minHeight:0}}>
            {cats.map(cat=>{
              const items = filtered.filter(w=>w.cat===cat);
              if(items.length===0) return null;
              return (
                <div key={cat} style={{marginBottom:14}}>
                  <div style={{fontSize:9.5,fontWeight:700,color:'var(--t4)',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:7}}>{cat}</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
                    {items.map(w=>{
                      const used = usedIds.includes(w.id);
                      return (
                        <button key={w.id} onClick={()=>onAddWidget(w.id)} title={w.name} style={{
                          textAlign:'left',padding:7,borderRadius:9,cursor:'pointer',
                          background:used?'rgba(59,130,246,.06)':'var(--s2)',
                          border:`1px solid ${used?'rgba(59,130,246,.3)':'var(--border)'}`,
                          transition:'all .15s',position:'relative',
                        }}
                          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--blue)';}}
                          onMouseLeave={e=>{e.currentTarget.style.borderColor=used?'rgba(59,130,246,.3)':'var(--border)';}}>
                          <w.Mini/>
                          <div style={{fontSize:11,fontWeight:600,color:'#e2e8f0',lineHeight:1.3,marginTop:8,
                            display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden',minHeight:'2.6em'}}>{w.name}</div>
                          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:5}}>
                            <span style={{fontSize:9,color:'var(--t4)',fontFamily:'var(--mono)'}}>{w.size}</span>
                            <span style={{width:16,height:16,borderRadius:4,flexShrink:0,background:used?'rgba(91,143,214,.18)':'rgba(255,255,255,.04)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                              <NI n={used?'edit':'plus'} s={9} c={used?'var(--blue)':'var(--t3)'} sw={2.2}/>
                            </span>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* CHAT TAB */}
      {tab==='chat' && (
        <>
          <div ref={chatRef} style={{flex:1,overflowY:'auto',padding:'8px 12px',display:'flex',flexDirection:'column',gap:10,minHeight:0}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start',animation:'aimIn .25s ease both'}}>
                {m.role==='ai'&&<div style={{display:'flex',alignItems:'center',gap:5,marginBottom:4}}><div style={{width:15,height:15,borderRadius:4,background:'linear-gradient(135deg,#6366f1,#a855f7)',display:'flex',alignItems:'center',justifyContent:'center'}}><NI n="sparkle" s={8} c="#fff" sw={0}/></div><span style={{fontSize:9,color:'var(--t4)',fontWeight:600}}>AIMI</span></div>}
                <div style={{maxWidth:'88%',padding:'9px 11px',borderRadius:m.role==='user'?'10px 10px 2px 10px':'10px 10px 10px 2px',
                  background:m.role==='user'?'rgba(59,130,246,.16)':'var(--s3)',border:`1px solid ${m.role==='user'?'rgba(59,130,246,.32)':'var(--border)'}`,
                  fontSize:11.5,lineHeight:1.6,color:'var(--t2)'}}>{m.text}</div>
              </div>
            ))}
            {loading&&<div style={{display:'flex',gap:3,padding:'9px 11px',background:'var(--s3)',borderRadius:10,border:'1px solid var(--border)',width:'fit-content'}}>{[0,1,2].map(i=>(<div key={i} style={{width:5,height:5,borderRadius:'50%',background:'var(--blue)',animation:`aimPulse 1.2s ${i*.2}s infinite`}}/>))}</div>}
          </div>
          <div style={{padding:'0 12px 8px',display:'flex',flexWrap:'wrap',gap:6,flexShrink:0}}>
            {['히트맵 위젯 추가','이상 점수 분석','대시보드 정리'].map(c=>(<button key={c} onClick={()=>send(c)} style={{fontSize:10.5,padding:'4px 10px',borderRadius:12,border:'1px solid var(--border2)',background:'var(--s2)',color:'var(--t3)',cursor:'pointer',fontFamily:'var(--font)'}}>{c}</button>))}
          </div>
          <div style={{padding:'8px 12px 12px',borderTop:'1px solid var(--border)',flexShrink:0,display:'flex',gap:7,alignItems:'flex-end'}}>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder="메시지를 입력하세요..." style={{flex:1,resize:'none',background:'var(--s3)',border:'1px solid var(--border2)',borderRadius:9,padding:'9px 11px',color:'var(--t1)',fontSize:12,fontFamily:'var(--font)',lineHeight:1.5,outline:'none',minHeight:38,maxHeight:80}}/>
            <button onClick={()=>send()} style={{width:34,height:34,borderRadius:8,border:'none',cursor:'pointer',flexShrink:0,background:input?'linear-gradient(135deg,#3b82f6,#2563eb)':'var(--s3)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:input?'0 2px 8px rgba(59,130,246,.4)':'none'}}>
              <NI n="send" s={14} c="#fff" sw={2}/>
            </button>
          </div>
        </>
      )}
    </div>
  );
};

/* ── CENTER NAV (KOWEPO) ─────────────────── */
const SideNav = ()=>{
  const [active,setActive] = useState('home');
  const items=[['home','home','홈'],['dash','dash','통합 대시보드'],['diag','diag','설비 진단'],['env','env','환경 진단'],['worker','worker','작업자 안전'],['bell','bell','알림/이벤트'],['report','report','리포트'],['settings','settings','설정']];
  return (
    <div style={{width:212,flexShrink:0,display:'flex',flexDirection:'column',background:'var(--s1)',borderRight:'1px solid var(--border)',height:'100%'}}>
      <div style={{padding:'18px 18px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <div style={{width:32,height:32,borderRadius:9,background:'linear-gradient(135deg,#0ea5e9,#2563eb)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9z"/></svg>
        </div>
        <div>
          <div style={{fontSize:12.5,fontWeight:700,letterSpacing:'-0.01em'}}>한국서부발전</div>
          <div style={{fontSize:9.5,color:'var(--t3)',fontFamily:'var(--mono)'}}>KOWEPO · AIoT</div>
        </div>
      </div>
      <nav style={{flex:1,overflowY:'auto',padding:'12px 12px'}}>
        {items.map(([id,ic,l])=>(
          <button key={id} onClick={()=>setActive(id)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:10,border:'none',cursor:'pointer',marginBottom:3,
            background:active===id?'linear-gradient(135deg,#1d6fe0,#2563eb)':'transparent',
            color:active===id?'#fff':'var(--t3)',fontSize:13,fontFamily:'var(--font)',fontWeight:active===id?600:500,transition:'all .15s',textAlign:'left',
            boxShadow:active===id?'0 4px 14px rgba(37,99,235,.4)':'none'}}>
            <NI n={ic} s={17} c={active===id?'#fff':'var(--t3)'} sw={active===id?2:1.8}/>{l}
          </button>
        ))}
      </nav>
      <div style={{padding:'14px 18px',borderTop:'1px solid var(--border)',flexShrink:0}}>
        <button style={{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer',color:'var(--t3)',fontSize:12,fontFamily:'var(--font)'}}>
          <NI n="chevLeft" s={14} c="var(--t3)" sw={2}/> 메뉴 접기
        </button>
        <div style={{fontSize:10,color:'var(--t4)',marginTop:12,lineHeight:1.6}}>© 2026 KOWEPO.<br/>All rights reserved.</div>
      </div>
    </div>
  );
};

/* ── CONTENT AREA (resizable 12-col grid) ────────── */
const ROW_UNIT = 30, GRID_GAP = 14, GRID_COLS = 12;

const Content = ({ placed, setPlaced, onRemove, selected, setSelected })=>{
  const gridRef = useRef(null);
  const drag = useRef(null);
  const moveRef = useRef(()=>{}), upRef = useRef(()=>{});

  moveRef.current = (e)=>{
    const d = drag.current; if(!d) return;
    const gw = gridRef.current ? gridRef.current.clientWidth : 1200;
    const colTrack = (gw - (GRID_COLS-1)*GRID_GAP)/GRID_COLS;
    setPlaced(prev=>prev.map(p=>{
      if(p.uid!==d.uid) return p;
      let span=p.span, rows=p.rows;
      if(d.mode==='r'||d.mode==='c'){
        const dCols = Math.round((e.clientX-d.x)/(colTrack+GRID_GAP));
        span = Math.max(3, Math.min(12, d.span+dCols));
      }
      if(d.mode==='b'||d.mode==='c'){
        const dRows = Math.round((e.clientY-d.y)/(ROW_UNIT+GRID_GAP));
        rows = Math.max(4, Math.min(16, d.rows+dRows));
      }
      return {...p,span,rows};
    }));
  };
  upRef.current = ()=>{ drag.current=null; document.body.style.cursor=''; };

  const startResize = (uid,mode,e)=>{
    e.preventDefault(); e.stopPropagation();
    const it = placed.find(p=>p.uid===uid);
    drag.current = { uid, mode, x:e.clientX, y:e.clientY, span:it.span, rows:it.rows };
    document.body.style.cursor = mode==='r'?'ew-resize':mode==='b'?'ns-resize':'nwse-resize';
    const mv = ev=>moveRef.current(ev);
    const up = ev=>{ upRef.current(ev); window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); };
    window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
  };

  const Handle = ({uid,mode})=>{
    const base = {position:'absolute',zIndex:8,background:'transparent'};
    const bar = {position:'absolute',background:'var(--sel)',borderRadius:6,boxShadow:'0 0 10px rgba(59,130,246,.6)'};
    if(mode==='r') return (
      <div onMouseDown={e=>startResize(uid,'r',e)} style={{...base,top:0,bottom:0,right:-6,width:14,cursor:'ew-resize',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{...bar,width:4,height:42,right:5}}/>
      </div>);
    if(mode==='b') return (
      <div onMouseDown={e=>startResize(uid,'b',e)} style={{...base,left:0,right:0,bottom:-6,height:14,cursor:'ns-resize',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{...bar,height:4,width:42,bottom:5}}/>
      </div>);
    return (
      <div onMouseDown={e=>startResize(uid,'c',e)} style={{...base,right:-7,bottom:-7,width:18,height:18,cursor:'nwse-resize'}}>
        <div style={{position:'absolute',right:4,bottom:4,width:10,height:10,borderRight:'3px solid var(--sel)',borderBottom:'3px solid var(--sel)',borderBottomRightRadius:3}}/>
      </div>);
  };

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,background:'var(--bg)',position:'relative',overflow:'hidden'}}>
      {/* content header */}
      <div style={{padding:'18px 28px',borderBottom:'1px solid var(--border)',background:'var(--s1)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:18}}>
          <h1 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.02em'}}>AIoT 복합 계측 모니터링</h1>
          <div style={{display:'flex',gap:18,alignItems:'center'}}>
            {[['전체 설비 정상','128',C.green],['주의','6',C.yellow],['위험','2',C.red],['알림','26',C.cyan]].map(([k,v,c])=>(
              <div key={k} style={{display:'flex',alignItems:'center',gap:7}}>
                <span style={{width:7,height:7,borderRadius:'50%',background:c}}/>
                <span style={{fontSize:12,color:'var(--t3)'}}>{k}</span>
                <span style={{fontSize:13,fontWeight:700,color:'#e2e8f0',fontFamily:'var(--mono)'}}>{v}</span>
              </div>
            ))}
            <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 11px',borderRadius:20,background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.28)'}}>
              <span style={{fontSize:11,color:C.green,fontWeight:600}}>가동률 89.4%</span>
            </div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <span style={{fontSize:13,color:'var(--t2)',fontFamily:'var(--mono)'}}>2026.05.30 (토) 08:24:36</span>
          <button style={{position:'relative',width:34,height:34,borderRadius:9,border:'1px solid var(--border)',background:'var(--s2)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <NI n="bellTop" s={15} c="var(--t2)" sw={1.8}/>
            <span style={{position:'absolute',top:5,right:5,width:7,height:7,borderRadius:'50%',background:C.red,border:'1.5px solid var(--s2)'}}/>
          </button>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 12px 5px 6px',borderRadius:9,border:'1px solid var(--border)',background:'var(--s2)',cursor:'pointer'}}>
            <div style={{width:26,height:26,borderRadius:7,background:'linear-gradient(135deg,#3b82f6,#2563eb)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>홍</div>
            <div><div style={{fontSize:11.5,fontWeight:600}}>홍길동</div><div style={{fontSize:9,color:'var(--t3)'}}>관리자</div></div>
            <NI n="chevDown" s={13} c="var(--t4)" sw={2}/>
          </div>
        </div>
      </div>

      {/* edit hint bar */}
      {selected && (
        <div style={{padding:'8px 28px',background:'rgba(59,130,246,.08)',borderBottom:'1px solid rgba(59,130,246,.2)',flexShrink:0,display:'flex',alignItems:'center',gap:10}}>
          <NI n="drag" s={13} c="var(--sel)" sw={1.6}/>
          <span style={{fontSize:11.5,color:'#cbd5e1'}}>위젯이 선택되었습니다 · 우측·하단·모서리의 <b style={{color:'var(--sel)'}}>파란 핸들</b>을 드래그해 12-그리드 안에서 크기를 조절하세요</span>
          <button onClick={()=>setSelected(null)} style={{marginLeft:'auto',fontSize:11,color:'var(--t3)',background:'none',border:'none',cursor:'pointer'}}>선택 해제</button>
        </div>
      )}

      {/* widget grid */}
      <div style={{flex:1,overflowY:'auto',padding:'20px 24px 60px',minHeight:0}}
        onMouseDown={e=>{ if(e.target===e.currentTarget) setSelected(null); }}>
        {placed.length===0 ? (
          <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
            <div style={{width:60,height:60,borderRadius:16,background:'var(--s2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <NI n="widget" s={26} c="var(--t4)" sw={1.5}/>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:14,fontWeight:600,color:'var(--t2)',marginBottom:5}}>배치된 위젯이 없습니다</div>
              <div style={{fontSize:12,color:'var(--t4)'}}>좌측 위젯 라이브러리에서 위젯을 클릭해 캔버스에 추가하세요</div>
            </div>
          </div>
        ) : (
          <div ref={gridRef} style={{display:'grid',gridTemplateColumns:'repeat(12,1fr)',gap:GRID_GAP,gridAutoRows:`${ROW_UNIT}px`,alignItems:'stretch'}}
            onMouseDown={e=>{ if(e.target===e.currentTarget) setSelected(null); }}>
            {placed.map((p)=>{
              const w = WIDGETS.find(x=>x.id===p.id);
              const isSel = selected===p.uid;
              return (
                <div key={p.uid} className="aim-card-enter"
                  onMouseDown={e=>{ e.stopPropagation(); setSelected(p.uid); }}
                  style={{gridColumn:`span ${p.span}`,gridRow:`span ${p.rows}`,position:'relative',
                    borderRadius:14, transition:'box-shadow .15s',
                    boxShadow:isSel?'0 0 0 2px var(--sel), 0 0 0 6px rgba(59,130,246,.15)':'none'}}
                  onMouseEnter={e=>{const b=e.currentTarget.querySelector('.wbtns');if(b)b.style.opacity='1';}}
                  onMouseLeave={e=>{const b=e.currentTarget.querySelector('.wbtns');if(b)b.style.opacity='0';}}>
                  {/* top buttons */}
                  <div className="wbtns" style={{position:'absolute',top:10,right:12,zIndex:9,display:'flex',gap:5,opacity:isSel?1:0,transition:'opacity .15s'}}>
                    <span style={{display:'flex',alignItems:'center',padding:'2px 8px',borderRadius:6,background:'rgba(15,22,35,.92)',border:'1px solid var(--border2)',fontSize:9.5,color:'var(--t3)',fontFamily:'var(--mono)'}}>{p.span} × {p.rows}</span>
                    <button onClick={ev=>{ev.stopPropagation();onRemove(p.uid);}} style={{width:24,height:24,borderRadius:6,border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.14)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><NI n="close" s={12} c={C.red} sw={2}/></button>
                  </div>
                  <w.Full/>
                  {/* resize handles — only when selected */}
                  {isSel && <><Handle uid={p.uid} mode="r"/><Handle uid={p.uid} mode="b"/><Handle uid={p.uid} mode="c"/></>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
};

/* ── APP ─────────────────────────────────── */
const defaultRows = (w)=> w.span>=6 ? 8 : 7;
const App = ()=>{
  const initial = ['arc','lstm','battery','deploy','ae','f1f2','gas','dt'];
  const mk = (id,i)=>{ const w=WIDGETS.find(x=>x.id===id); return {id,uid:`w${i}`,span:w.span,rows:defaultRows(w)}; };
  const [placed,setPlaced] = useState(initial.map(mk));
  const [counter,setCounter] = useState(initial.length);
  const [selected,setSelected] = useState(null);

  const addWidget = (id)=>{ const w=WIDGETS.find(x=>x.id===id); const uid=`w${counter}`;
    setPlaced(p=>[...p,{id,uid,span:w.span,rows:defaultRows(w)}]); setCounter(c=>c+1); setSelected(uid); };
  const removeWidget = (uid)=>{ setPlaced(p=>p.filter(x=>x.uid!==uid)); if(selected===uid) setSelected(null); };
  const usedIds = [...new Set(placed.map(p=>p.id))];

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <TopBar/>
      <div style={{flex:1,display:'flex',minHeight:0}}>
        <LeftPanel onAddWidget={addWidget} usedIds={usedIds}/>
        <SideNav/>
        <Content placed={placed} setPlaced={setPlaced} onRemove={removeWidget} selected={selected} setSelected={setSelected}/>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
