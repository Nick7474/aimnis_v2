<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIM GUARD — 통합 보안 모니터링</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:oklch(8% 0.025 275);--s1:oklch(11% 0.022 275);--s2:oklch(14% 0.020 275);
  --s3:oklch(18% 0.018 275);--s4:oklch(22% 0.016 275);
  --border:oklch(100% 0 0/.07);--border2:oklch(100% 0 0/.12);--border3:oklch(100% 0 0/.18);
  --primary:oklch(60% 0.20 285);--cyan:oklch(70% 0.14 210);--green:oklch(65% 0.16 145);
  --red:oklch(58% 0.22 25);--orange:oklch(68% 0.18 55);--yellow:oklch(74% 0.16 85);
  --t1:oklch(96% 0.008 275);--t2:oklch(68% 0.012 275);--t3:oklch(45% 0.010 275);--t4:oklch(30% 0.008 275);
  --font:'Plus Jakarta Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--t1);overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

/* ── ICONS ─────────────────────────────────── */
const P = {
  shield:<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
  camera:<><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>,
  bell:<><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
  barChart:<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
  zap:<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
  settings:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
  map:<><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></>,
  plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
  close:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
  check:<polyline points="20 6 9 17 4 12"/>,
  chevronLeft:<polyline points="15 18 9 12 15 6"/>,
  chevronRight:<polyline points="9 18 15 12 9 6"/>,
  chevronDown:<polyline points="6 9 12 15 18 9"/>,
  edit:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
  trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>,
  user:<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
  refresh:<><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></>,
  download:<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
  cpu:<><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/></>,
  wifi:<><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></>,
  filter:<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>,
  search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
};
const Ic = ({n,s=16,c='currentColor',sw=1.7,fill='none'})=>(
  <svg width={s} height={s} viewBox="0 0 24 24" fill={fill} stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>{P[n]}</svg>
);

/* ── LOGO ──────────────────────────────────── */
const Logo = ({size=22})=>(
  <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
    <defs><linearGradient id="lgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#FF6B35"/><stop offset="50%" stopColor="#C850C0"/><stop offset="100%" stopColor="#4158D0"/>
    </linearGradient></defs>
    <circle cx="20" cy="20" r="18" fill="url(#lgG)" opacity=".15"/>
    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#lgG)" strokeWidth="1.5"/>
    <path d="M12 28L20 12L28 28" stroke="url(#lgG)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    <path d="M14.5 22.5H25.5" stroke="url(#lgG)" strokeWidth="2" strokeLinecap="round"/>
    <circle cx="20" cy="20" r="3" fill="url(#lgG)" opacity=".8"/>
  </svg>
);

/* ── TOGGLE ────────────────────────────────── */
const Toggle = ({on,onChange})=>(
  <div onClick={()=>onChange(!on)} style={{width:34,height:19,borderRadius:10,background:on?'var(--primary)':'var(--s4)',position:'relative',cursor:'pointer',transition:'background .2s',flexShrink:0}}>
    <div style={{position:'absolute',top:2,left:on?15:2,width:15,height:15,borderRadius:'50%',background:'white',transition:'left .2s',boxShadow:'0 1px 4px rgba(0,0,0,.4)'}}/>
  </div>
);

/* ── PAGE TYPE DEFS ────────────────────────── */
const PAGE_TYPES = [
  {id:'video',  icon:'camera',   name:'영상 모니터링', desc:'CCTV 채널별 실시간 영상 및 멀티뷰 모니터링',   color:'var(--cyan)'},
  {id:'events', icon:'bell',     name:'이벤트',       desc:'보안 알람 이벤트 목록 및 처리 현황',             color:'var(--orange)'},
  {id:'stats',  icon:'barChart', name:'통계',         desc:'구역별·시간대별 이벤트 통계 및 분석 차트',       color:'var(--primary)'},
  {id:'rules',  icon:'zap',      name:'이벤트 규칙',  desc:'알람 발생 조건 및 자동 대응 규칙 설정',           color:'var(--yellow)'},
  {id:'settings',icon:'settings',name:'설정',         desc:'시스템 환경 설정, 사용자 관리, 장치 연결',         color:'var(--t2)'},
];
const SPECS = {
  video:{title:'영상 모니터링 설정',qs:[
    {id:'split',label:'기본 화면 분할 방식은?',multi:false,options:['1분할','4분할','9분할','16분할','32분할']},
    {id:'quality',label:'스트리밍 화질 우선순위는?',multi:false,options:['고화질 (4K/2K)','표준 (FHD)','저지연 우선 (SD)','자동 조절']},
    {id:'features',label:'필요한 기능을 선택하세요 (복수)',multi:true,options:['PTZ 제어','화면 녹화','스냅샷 저장','알람 팝업 연동','전체화면 모드']},
  ]},
  events:{title:'이벤트 목록 설정',qs:[
    {id:'types',label:'모니터링할 이벤트 유형은? (복수)',multi:true,options:['INTRUSION (침입 감지)','ACCESS_DENIED (접근 거부)','FORCED_OPEN (강제 개방)','DI_INPUT (센서 입력)','DOOR_HELD_OPEN (문 열림 유지)']},
    {id:'filter',label:'기본 필터 상태는?',multi:false,options:['전체 이벤트','미확인(UNACKED)만','오늘 발생 이벤트','최근 24시간']},
    {id:'cols',label:'표시 컬럼을 선택하세요 (복수)',multi:true,options:['발생시간','Zone','장비명','이벤트 타입','위치','확인 상태','담당자']},
  ]},
  stats:{title:'통계 대시보드 설정',qs:[
    {id:'period',label:'기본 집계 기간은?',multi:false,options:['오늘','최근 7일','이번 달','분기','사용자 지정']},
    {id:'charts',label:'표시할 차트 유형은? (복수)',multi:true,options:['시간대별 이벤트 추이','Zone별 TOP 5','장비 유형별 비율','이벤트 타입 분류','주간 비교 추이']},
    {id:'kpis',label:'상단 KPI 카드 항목은? (복수)',multi:true,options:['전체 이벤트','위험(CRITICAL)','미확인 알람','확인 처리율','평균 응답 시간']},
  ]},
  rules:{title:'이벤트 규칙 설정',qs:[
    {id:'triggers',label:'주요 규칙 트리거 유형은? (복수)',multi:true,options:['침입 감지 (INTRUSION)','접근 거부 (ACCESS_DENIED)','강제 개방 (FORCED_OPEN)','센서 이상 (DI_INPUT)','복합 조건 트리거']},
    {id:'actions',label:'자동 대응 액션은? (복수)',multi:true,options:['CCTV 팝업 표시','PTZ 프리셋 이동','릴레이 제어','앱 알림 전송','외부 API 호출']},
    {id:'severity',label:'적용할 심각도 수준은? (복수)',multi:true,options:['CRITICAL','HIGH','MEDIUM','LOW']},
  ]},
  settings:{title:'설정 페이지 구성',qs:[
    {id:'tabs',label:'필요한 설정 탭은? (복수)',multi:true,options:['맵 관리','Zone 편집','장비 관리','VMS/CCTV 연동','사용자 권한']},
    {id:'maptype',label:'사용 중인 맵 유형은?',multi:false,options:['도면 이미지 (IMAGE)','위성 지도 (NAVER/카카오)','혼합 사용','3D 평면도']},
    {id:'users',label:'사용자 권한 체계는?',multi:false,options:['2단계 (관리자/일반)','3단계 (관리자/운영자/조회)','커스텀 역할 설정']},
  ]},
};

/* ── CHIP ──────────────────────────────────── */
const Chip = ({label,selected,onClick})=>(
  <button onClick={onClick} style={{
    display:'inline-flex',alignItems:'center',gap:6,padding:'6px 13px',borderRadius:7,cursor:'pointer',
    border:`1px solid ${selected?'oklch(60% 0.20 285 / .7)':'var(--border2)'}`,
    background:selected?'oklch(60% 0.20 285 / .15)':'var(--s2)',
    color:selected?'var(--t1)':'var(--t2)',fontSize:12,fontFamily:'var(--font)',
    fontWeight:selected?600:400,transition:'all .15s',
  }}>
    {selected&&<svg width={11} height={11} viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="var(--primary)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    {label}
  </button>
);

/* ── HARNESS PREVIEW ───────────────────────── */
const HarnessPreview = ({selected, answers, specs, canCreate, onCreate})=>{
  const [visibleCount, setVisibleCount] = useState(0);
  const [streamKey, setStreamKey] = useState(0);
  const scrollRef = useRef(null);
  const prevAnsRef = useRef('');

  const fileNames = {video:'video_monitoring.md',events:'event_management.md',stats:'statistics_dashboard.md',rules:'event_rules.md',settings:'system_settings.md'};
  const fileName = (selected&&fileNames[selected.id])||'config.md';
  const catMap = {
    video:['기본 설정','화질 설정','기능 구성'],
    events:['이벤트 유형','필터 설정','컬럼 구성'],
    stats:['기간 설정','차트 구성','KPI 설정'],
    rules:['트리거 설정','액션 구성','심각도 설정'],
    settings:['탭 구성','맵 설정','권한 설정'],
  };

  const lines = useMemo(()=>{
    if(!selected||!specs) return [];
    const r=[];
    const today='2026. 4. 26.';
    const cats=catMap[selected.id]||['설정 1','설정 2','설정 3'];
    r.push({t:'h1',text:`# ${selected.name} 설정서`});
    r.push({t:'blank'});
    r.push({t:'h2',text:'## 프로젝트 정보'});
    r.push({t:'meta',text:`- 솔루션: AIM GUARD v1.0`});
    r.push({t:'meta',text:`- 생성일: ${today}`});
    r.push({t:'meta',text:`- 상태: 설계 중...`});
    r.push({t:'blank'});
    specs.qs.forEach((q,i)=>{
      const ans=answers[q.id]||[];
      const ok=ans.length>0;
      r.push({t:'h2',text:`## ${cats[i]||q.label}`});
      r.push({t:'q',ok,text:q.label});
      if(ok) ans.forEach(a=>r.push({t:'a',text:a}));
      else r.push({t:'pending'});
      r.push({t:'blank'});
    });
    return r;
  },[selected,answers,specs]);

  const ansStr = JSON.stringify(answers);
  useEffect(()=>{
    if(ansStr!==prevAnsRef.current){
      prevAnsRef.current=ansStr;
      setStreamKey(k=>k+1);
      setVisibleCount(0);
    }
  },[ansStr]);

  useEffect(()=>{
    if(visibleCount<lines.length){
      const t=setTimeout(()=>setVisibleCount(v=>v+1),14);
      return()=>clearTimeout(t);
    }
  },[visibleCount,lines.length,streamKey]);

  // Show all lines on first mount
  useEffect(()=>{ setVisibleCount(lines.length); },[]);

  useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[visibleCount]);

  const streaming = visibleCount<lines.length;

  return (
    <div style={{width:400,flexShrink:0,display:'flex',flexDirection:'column',background:'oklch(9% 0.020 275)',height:'100%',animation:'fadeIn .3s ease .1s both'}}>
      {/* Panel header */}
      <div style={{padding:'16px 20px 12px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <div style={{fontSize:12,fontWeight:700,color:'var(--t2)',marginBottom:3}}>AI 생성 미리보기</div>
        <div style={{fontSize:11,color:'var(--t4)'}}>대화 내용을 바탕으로 실시간 설계서가 작성됩니다</div>
      </div>

      {/* Editor window */}
      <div style={{flex:1,overflow:'hidden',padding:'14px 16px 0',display:'flex',flexDirection:'column'}}>
        {/* macOS window chrome */}
        <div style={{background:'oklch(16% 0.018 275)',borderRadius:'10px 10px 0 0',border:'1px solid var(--border2)',borderBottom:'none',padding:'9px 14px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <div style={{display:'flex',gap:5}}>
            {['#FF5F57','#FFBD2E','#28CA41'].map(c=>(<div key={c} style={{width:10,height:10,borderRadius:'50%',background:c}}/>))}
          </div>
          <div style={{flex:1,textAlign:'center'}}>
            <span style={{fontSize:11,color:'var(--t3)',fontFamily:'var(--mono)'}}>{fileName}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5,padding:'2px 8px',borderRadius:4,background:'oklch(65% 0.16 145 / .12)',border:'1px solid oklch(65% 0.16 145 / .3)'}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:'var(--green)',animation:'pulse 1.5s infinite'}}/>
            <span style={{fontSize:9,color:'var(--green)',fontWeight:700,letterSpacing:'0.06em'}}>LIVE</span>
          </div>
        </div>

        {/* Markdown content */}
        <div ref={scrollRef} style={{flex:1,overflowY:'auto',background:'oklch(12% 0.018 275)',border:'1px solid var(--border2)',borderTop:'none',borderRadius:'0 0 10px 10px',padding:'14px 16px',fontFamily:'var(--mono)',fontSize:11,lineHeight:1.85}}>
          {lines.slice(0,visibleCount).map((ln,i)=>{
            if(ln.t==='blank') return <div key={i} style={{height:6}}/>;
            if(ln.t==='h1') return <div key={i} style={{fontSize:15,fontWeight:700,color:'var(--t1)',marginBottom:4,letterSpacing:'-0.01em'}}>{ln.text}</div>;
            if(ln.t==='h2') return <div key={i} style={{fontSize:12,fontWeight:700,color:'var(--cyan)',marginTop:8}}>{ln.text}</div>;
            if(ln.t==='meta') return <div key={i} style={{color:'var(--t3)',paddingLeft:4}}>{ln.text}</div>;
            if(ln.t==='q') return (
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:7,paddingLeft:4,marginTop:2}}>
                <span style={{color:ln.ok?'oklch(65% 0.16 145)':'var(--t4)',flexShrink:0}}>{ln.ok?'✅':'□'}</span>
                <span style={{color:ln.ok?'var(--t1)':'var(--t3)',fontWeight:ln.ok?600:400}}>**{ln.text}**</span>
              </div>
            );
            if(ln.t==='a') return <div key={i} style={{color:'var(--t2)',paddingLeft:28}}>{'  - '+ln.text}</div>;
            if(ln.t==='pending') return <div key={i} style={{color:'var(--t4)',paddingLeft:28}}>{'  - 선택 대기 중...'}</div>;
            return null;
          })}
          {streaming&&<span style={{display:'inline-block',width:7,height:12,background:'var(--primary)',animation:'pulse .6s infinite',verticalAlign:'text-bottom',marginLeft:2,borderRadius:1}}/>}
        </div>
      </div>

      {/* Create Harness button */}
      <div style={{padding:'14px 16px 16px',borderTop:'1px solid var(--border)',flexShrink:0,marginTop:8}}>
        <button onClick={onCreate} style={{
          width:'100%',padding:'13px',borderRadius:10,border:'none',

        }}>

        </button>

        </div>
      </div>
    </div>
  );
};

/* ── PAGE ADD MODAL ────────────────────────── */
const PageAddModal = ({addedIds, onSelect, onClose})=>{
  const [step, setStep] = useState(1); // 1=select, 2=spec
  const [selected, setSelected] = useState(null);
  const [answers, setAnswers] = useState({});

  const pick = (pt) => { setSelected(pt); setStep(2); };
  const onAnswer = (qid, val) => setAnswers(p=>({...p,[qid]:val}));
  const toggle = (qid, opt, multi) => {
    const cur = answers[qid]||[];
    if(multi) onAnswer(qid, cur.includes(opt)?cur.filter(x=>x!==opt):[...cur,opt]);
    else onAnswer(qid, cur[0]===opt?[]:[opt]);
  };
  const canCreate = selected && SPECS[selected.id].qs.some(q=>(answers[q.id]||[]).length>0);

  return (
    <div style={{position:'fixed',top:44,bottom:28,left:220,right:240,zIndex:500,display:'flex',alignItems:'stretch',justifyContent:'flex-start'}}>
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.5)',backdropFilter:'blur(4px)'}}
        onClick={onClose}/>
      {/* Two-panel container */}
      <div style={{
        position:'relative',zIndex:1,display:'flex',flexDirection:'row',height:'100%',
        animation:'slideInRight .25s cubic-bezier(.16,1,.3,1) both',
        boxShadow:'8px 0 40px rgba(0,0,0,.5)',
      }}>
        {/* LEFT — questions panel */}
        <div style={{
          width:480,flexShrink:0,
          background:'var(--s1)',borderRight:'1px solid var(--border2)',
          display:'flex',flexDirection:'column',height:'100%',
        }}>
        {/* Header */}
        <div style={{padding:'20px 24px 16px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              {step===2&&(
                <button onClick={()=>{setStep(1);setSelected(null);setAnswers({});}} style={{
                  width:28,height:28,borderRadius:7,border:'1px solid var(--border2)',background:'transparent',
                  cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
                }}>
                  <Ic n='chevronLeft' s={14} c='var(--t3)' sw={2}/>
                </button>
              )}
              <div>
                <h2 style={{fontSize:16,fontWeight:700,letterSpacing:'-0.01em'}}>
                  {step===1?'페이지 추가':selected?.name+' 설정'}
                </h2>
                <p style={{fontSize:11,color:'var(--t3)',marginTop:2}}>
                  {step===1?'추가할 페이지를 선택하세요':'설문에 답변하면 최적 설정으로 페이지를 생성합니다'}
                </p>
              </div>
            </div>
            <button onClick={onClose} style={{width:30,height:30,borderRadius:8,border:'1px solid var(--border)',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Ic n='close' s={14} c='var(--t3)' sw={2}/>
            </button>
          </div>
          {/* Step indicator */}
          <div style={{display:'flex',gap:6,marginTop:12}}>
            {['페이지 선택','기능 설정'].map((s,i)=>(
              <div key={s} style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{
                  width:20,height:20,borderRadius:'50%',
                  background:step>i?'var(--primary)':step===i+1?'var(--primary)':'var(--s4)',
                  border:`1px solid ${step>i||step===i+1?'var(--primary)':'var(--border2)'}`,
                  display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,
                  color:step>=i+1?'white':'var(--t4)',
                }}>
                  {step>i+1?<Ic n='check' s={10} c='white' sw={2.5}/>:i+1}
                </div>
                <span style={{fontSize:11,color:step===i+1?'var(--t1)':'var(--t4)',fontWeight:step===i+1?600:400}}>{s}</span>
                {i<1&&<Ic n='chevronRight' s={12} c='var(--t4)' sw={1.5}/>}
              </div>
            ))}
          </div>
        </div>

        {/* Body */}
        <div style={{flex:1,overflowY:'auto',padding:'16px 24px'}}>
          {step===1&&(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {PAGE_TYPES.map(pt=>{
                const added = addedIds.includes(pt.id);
                return (
                  <button key={pt.id} onClick={()=>!added&&pick(pt)} style={{
                    display:'flex',alignItems:'center',gap:16,padding:'16px 18px',
                    border:`1px solid ${added?'var(--border)':'var(--border2)'}`,
                    borderRadius:12,cursor:added?'default':'pointer',background:added?'transparent':'var(--s2)',
                    transition:'all .15s',opacity:added?.5:1,textAlign:'left',
                  }}
                    onMouseEnter={e=>{if(!added){e.currentTarget.style.borderColor='oklch(60% 0.20 285 / .5)';e.currentTarget.style.background='var(--s3)';}}}
                    onMouseLeave={e=>{if(!added){e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.background='var(--s2)';}}}
                  >
                    <div style={{
                      width:44,height:44,borderRadius:12,flexShrink:0,
                      background:`oklch(from ${pt.color} l c h / .15)`,
                      border:`1px solid oklch(from ${pt.color} l c h / .3)`,
                      display:'flex',alignItems:'center',justifyContent:'center',
                    }}>
                      <Ic n={pt.icon} s={20} c={pt.color} sw={1.7}/>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                        <span style={{fontSize:14,fontWeight:700,color:'var(--t1)'}}>{pt.name}</span>
                        {added&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:'var(--s4)',color:'var(--t4)',fontWeight:600}}>추가됨</span>}
                      </div>
                      <span style={{fontSize:12,color:'var(--t3)',lineHeight:1.5}}>{pt.desc}</span>
                    </div>
                    {!added&&<Ic n='chevronRight' s={16} c='var(--t4)' sw={1.5}/>}
                  </button>
                );
              })}
            </div>
          )}

          {step===2&&selected&&(
            <div style={{animation:'fadeUp .2s ease both'}}>
              {/* Page preview badge */}
              <div style={{
                display:'flex',alignItems:'center',gap:12,padding:'12px 16px',
                background:`oklch(from ${selected.color} l c h / .08)`,
                border:`1px solid oklch(from ${selected.color} l c h / .25)`,
                borderRadius:10,marginBottom:20,
              }}>
                <div style={{width:32,height:32,borderRadius:9,background:`oklch(from ${selected.color} l c h / .15)`,
                  display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Ic n={selected.icon} s={16} c={selected.color} sw={1.7}/>
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>{selected.name}</div>
                  <div style={{fontSize:11,color:'var(--t3)'}}>{selected.desc}</div>
                </div>
              </div>

              {/* Questions */}
              {SPECS[selected.id].qs.map((q,qi)=>{
                const ans = answers[q.id]||[];
                return (
                  <div key={q.id} style={{
                    marginBottom:18,padding:'16px',
                    background:ans.length>0?'oklch(60% 0.20 285 / .04)':'var(--s2)',
                    border:`1px solid ${ans.length>0?'oklch(60% 0.20 285 / .25)':'var(--border)'}`,
                    borderRadius:12,transition:'all .2s',
                  }}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                      <span style={{fontSize:11,fontWeight:700,color:'var(--t4)',fontFamily:'var(--mono)'}}>{String(qi+1).padStart(2,'0')}</span>
                      <p style={{fontSize:13,fontWeight:600,color:'var(--t1)',flex:1,lineHeight:1.4}}>{q.label}</p>
                      {ans.length>0&&<Ic n='check' s={14} c='var(--green)' sw={2.5}/>}
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                      {q.options.map(opt=>(
                        <Chip key={opt} label={opt} selected={ans.includes(opt)}
                          onClick={()=>toggle(q.id,opt,q.multi)}/>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Footer */}
        {step===1&&(
          <div style={{padding:'12px 24px',borderTop:'1px solid var(--border)',flexShrink:0}}>
            <div style={{fontSize:11,color:'var(--t4)',textAlign:'center'}}>페이지를 선택하면 설정 단계로 이동합니다</div>
          </div>
        )}
        </div>{/* end left panel */}

        {/* RIGHT — Harness Preview (step 2 only) */}
        {step===2&&selected&&(
          <HarnessPreview
            selected={selected} answers={answers} specs={SPECS[selected.id]}
            canCreate={canCreate}
            onCreate={()=>{if(canCreate){onSelect(selected);onClose();}}}
          />
        )}
      </div>{/* end two-panel container */}
    </div>
  );
};

                return (
                  <circle key={i} cx={45} cy={45} r={36} fill="none" stroke={d.c} strokeWidth={14}

        {/* AI Chat Panel */}
        <div style={{width:220,flexShrink:0,display:'flex',flexDirection:'column',background:'var(--s1)',borderRight:'1px solid var(--border)'}}>
          <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <div style={{width:22,height:22,borderRadius:6,background:'linear-gradient(135deg,var(--primary),oklch(52% 0.20 295))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width={10} height={10} viewBox="0 0 24 24" fill="white" stroke="none"><path d="M12 3L13.5 8.5L19 10L13.5 11.5L12 17L10.5 11.5L5 10L10.5 8.5L12 3Z"/></svg>
              </div>
              <span style={{fontSize:11,fontWeight:600,color:'var(--t2)'}}>AI 어시스턴트</span>
            </div>
            <div style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',animation:'pulse 2s infinite'}}/>
          </div>
          <div ref={chatBottomRef} style={{flex:1,overflowY:'auto',padding:'10px 10px 6px',display:'flex',flexDirection:'column',gap:8}}>
            {aiMessages.map((m,i)=>(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start',animation:'fadeUp .2s ease both'}}>
                {m.role==='ai'&&(
                  <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}>
                    <div style={{width:13,height:13,borderRadius:3,background:'linear-gradient(135deg,var(--primary),oklch(52% 0.20 295))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <svg width={7} height={7} viewBox="0 0 24 24" fill="white" stroke="none"><path d="M12 3L13.5 8.5L19 10L13.5 11.5L12 17L10.5 11.5L5 10L10.5 8.5L12 3Z"/></svg>
                    </div>
                    <span style={{fontSize:9,color:'var(--t4)',fontWeight:600}}>AIMNIS</span>
                  </div>
                )}
                <div style={{
                  maxWidth:'90%',padding:'8px 10px',
                  borderRadius:m.role==='user'?'9px 9px 2px 9px':'9px 9px 9px 2px',
                  background:m.role==='user'?'oklch(60% 0.20 285 / .18)':'var(--s3)',
                  border:`1px solid ${m.role==='user'?'oklch(60% 0.20 285 / .35)':'var(--border)'}`,
                  fontSize:11,lineHeight:1.6,color:'var(--t2)',
                }}>{m.text}</div>
              </div>
            ))}
            {aiLoading&&(
              <div style={{display:'flex',gap:3,padding:'8px 10px',background:'var(--s3)',borderRadius:'9px 9px 9px 2px',border:'1px solid var(--border)',width:'fit-content'}}>
                {[0,1,2].map(i=>(<div key={i} style={{width:5,height:5,borderRadius:'50%',background:'var(--primary)',animation:`pulse 1.2s ${i*0.2}s infinite`}}/>))}
              </div>
            )}
          </div>
          <div style={{padding:'0 8px 6px',display:'flex',flexWrap:'wrap',gap:5,flexShrink:0}}>
            {['카메라 추가','알람 분석','보고서 생성'].map(chip=>(
              <button key={chip} onClick={()=>sendAiMessage(chip)} style={{
                fontSize:10,padding:'3px 9px',borderRadius:10,border:'1px solid var(--border2)',
                background:'var(--s2)',color:'var(--t3)',cursor:'pointer',fontFamily:'var(--font)',transition:'all .15s',
              }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--primary)';e.currentTarget.style.color='var(--primary)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.color='var(--t3)';}}>
                {chip}
              </button>
            ))}
          </div>
          <div style={{padding:'6px 8px 8px',borderTop:'1px solid var(--border)',flexShrink:0,display:'flex',gap:6,alignItems:'flex-end'}}>
            <textarea value={aiInput} onChange={e=>setAiInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAiMessage();}}}
              placeholder="명령을 입력하세요..."
              style={{flex:1,resize:'none',background:'var(--s2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 9px',color:'var(--t1)',fontSize:11,fontFamily:'var(--font)',lineHeight:1.5,outline:'none',minHeight:34,maxHeight:68}}/>
            <button onClick={()=>sendAiMessage()} style={{
              width:30,height:30,borderRadius:7,border:'none',cursor:'pointer',flexShrink:0,
              background:aiInput.length>0?'linear-gradient(135deg,var(--primary),oklch(52% 0.20 295))':'var(--s3)',
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:aiInput.length>0?'0 2px 8px oklch(55% 0.22 285 / .35)':'none',transition:'all .2s',
            }}>
              <Ic n='arrowUp' s={13} c='white' sw={2.2}/>
            </button>
          </div>
        </div>

        {/* Nav Menu Panel */}
        <div style={{width:180,flexShrink:0,display:'flex',flexDirection:'column',background:'var(--s1)',borderRight:'1px solid var(--border)'}}>
          <div style={{padding:'10px 10px 4px',flexShrink:0}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--t4)',letterSpacing:'0.08em',textTransform:'uppercase',padding:'0 6px 6px'}}>모니터링 시스템</div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'0 8px'}}>
            {pages.map(pg=>(
              <div key={pg.id} onClick={()=>setActivePage(pg.id)} style={{
                display:'flex',alignItems:'center',gap:9,padding:'9px 10px',borderRadius:8,cursor:'pointer',
                background:activePage===pg.id?'oklch(60% 0.20 285 / .12)':'transparent',
                borderLeft:`2px solid ${activePage===pg.id?'var(--primary)':'transparent'}`,
                transition:'all .15s',marginBottom:2,
              }}
                onMouseEnter={e=>{if(activePage!==pg.id){e.currentTarget.style.background='var(--s2)';}}}
                onMouseLeave={e=>{if(activePage!==pg.id){e.currentTarget.style.background='transparent';}}}
              >
                <Ic n={pg.icon} s={13} c={activePage===pg.id?'var(--primary)':'var(--t3)'} sw={activePage===pg.id?2:1.7}/>
                <span style={{fontSize:11,fontWeight:activePage===pg.id?700:400,color:activePage===pg.id?'var(--t1)':'var(--t3)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pg.name}</span>
                {pg.id!=='map'&&(
                  <button onClick={e=>removePage(pg.id,e)} style={{width:14,height:14,borderRadius:3,border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .15s'}}
                    onMouseEnter={e=>{e.currentTarget.style.opacity='1';}}
                    onMouseLeave={e=>{e.currentTarget.style.opacity='0';}}>
                    <Ic n='close' s={9} c='var(--t4)' sw={2}/>
                  </button>
                )}
              </div>
            ))}
          </div>
          <div style={{padding:'8px 10px',borderTop:'1px solid var(--border)',flexShrink:0}}>
            <button onClick={()=>setShowModal(true)} style={{
              width:'100%',display:'flex',alignItems:'center',gap:8,padding:'8px 10px',
              borderRadius:8,border:'1px dashed var(--border2)',background:'transparent',cursor:'pointer',
              color:'var(--t3)',fontFamily:'var(--font)',fontSize:11,fontWeight:500,transition:'all .2s',
            }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--primary)';e.currentTarget.style.color='var(--primary)';e.currentTarget.style.background='oklch(60% 0.20 285 / .06)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.color='var(--t3)';e.currentTarget.style.background='transparent';}}>
              <Ic n='plus' s={12} c='currentColor' sw={2.5}/> 페이지 추가
            </button>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,position:'relative'}}>
          {/* Page content */}
          <div style={{flex:1,display:'flex',minHeight:0,animation:'fadeIn .2s ease both'}} key={activePage}>
            {renderPage()}
          </div>
        </div>

        {/* Right API Panel — always visible */}
        <RightApiPanel activePage={activePage}/>
      </div>
      <StatusBar/>

      {/* Modal */}
      {showModal&&<PageAddModal addedIds={addedIds} onSelect={(pt)=>{addPage(pt);setShowModal(false);}} onClose={()=>setShowModal(false)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
