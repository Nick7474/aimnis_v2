<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMNIS — AIM GUARD Edit</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       oklch(8% 0.025 275);
  --s1:       oklch(11% 0.022 275);
  --s2:       oklch(14% 0.020 275);
  --s3:       oklch(18% 0.018 275);
  --s4:       oklch(22% 0.016 275);
  --border:   oklch(100% 0 0 / .07);
  --border2:  oklch(100% 0 0 / .12);
  --border3:  oklch(100% 0 0 / .18);
  --primary:  oklch(60% 0.20 285);
  --cyan:     oklch(70% 0.14 210);
  --green:    oklch(65% 0.16 145);
  --red:      oklch(58% 0.22 25);
  --orange:   oklch(68% 0.18 55);
  --yellow:   oklch(74% 0.16 85);
  --t1:       oklch(96% 0.008 275);
  --t2:       oklch(68% 0.012 275);
  --t3:       oklch(45% 0.010 275);
  --t4:       oklch(32% 0.008 275);
  --font:     'Plus Jakarta Sans', sans-serif;
  --mono:     'DM Mono', monospace;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--t1);overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}
/* scrollbars */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": "285",
  "rightTab": "alarm",
  "showGrid": "true"
}/*EDITMODE-END*/;

/* ── LOGO ─────────────────── */
const Logo = ({size=22}) => (
  <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
    <defs><linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#FF6B35"/>
      <stop offset="50%" stopColor="#C850C0"/>
      <stop offset="100%" stopColor="#4158D0"/>
    </linearGradient></defs>
    <circle cx="20" cy="20" r="18" fill="url(#lg1)" opacity="0.15"/>
    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#lg1)" strokeWidth="1.5"/>
    <path d="M12 28 L20 12 L28 28" stroke="url(#lg1)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    <path d="M14.5 22.5 H25.5" stroke="url(#lg1)" strokeWidth="2" strokeLinecap="round"/>
    <circle cx="20" cy="20" r="3" fill="url(#lg1)" opacity="0.8"/>
  </svg>
);

/* ── SEVERITY BADGE ───────── */
const Severity = ({level}) => {
  const map = {CRITICAL:['var(--red)','위급'],HIGH:['var(--orange)','높음'],MEDIUM:['var(--yellow)','중간'],LOW:['var(--green)','낮음']};
  const [color,label] = map[level]||['var(--t3)','없음'];
  return (
    <span style={{
      fontSize:9,fontWeight:700,letterSpacing:'0.06em',padding:'2px 7px',
      borderRadius:4,border:`1px solid ${color}55`,background:`${color}18`,color,
      textTransform:'uppercase',flexShrink:0,
    }}>{label}</span>
  );
};

/* ── TOGGLE ───────────────── */
const Toggle = ({on,onChange}) => (
  <div onClick={()=>onChange(!on)} style={{
    width:32,height:18,borderRadius:9,
    background:on?'var(--primary)':'var(--s4)',
    position:'relative',cursor:'pointer',transition:'background .2s',flexShrink:0,
  }}>
    <div style={{
      position:'absolute',top:2,left:on?14:2,width:14,height:14,
      borderRadius:'50%',background:'white',transition:'left .2s',
      boxShadow:'0 1px 4px rgba(0,0,0,.4)',
    }}/>
  </div>
);

/* ── STATUS DOT ───────────── */
const Dot = ({color,pulse:p}) => (
  <span style={{width:7,height:7,borderRadius:'50%',background:color,flexShrink:0,
    display:'inline-block',animation:p?'pulse 2s infinite':'none'}}/>
);

/* ── TOP BAR ──────────────── */
const TopBar = () => {
  const [saved, setSaved] = useState(false);
  const save = () => { setSaved(true); setTimeout(()=>setSaved(false),2000); };
  return (
    <div style={{
      height:48,display:'flex',alignItems:'center',gap:0,flexShrink:0,
      background:'var(--s1)',borderBottom:'1px solid var(--border)',
      position:'relative',zIndex:10,
    }}>
      {/* Logo area */}
      <div style={{
        width:200,flexShrink:0,display:'flex',alignItems:'center',gap:9,
        padding:'0 16px',borderRight:'1px solid var(--border)',height:'100%',
      }}>
        <Logo size={20}/>
        <span style={{fontWeight:700,fontSize:12,letterSpacing:'0.04em'}}>AIMNIS</span>
        <span style={{
          fontSize:9,fontWeight:700,letterSpacing:'0.08em',padding:'2px 6px',
          background:'oklch(60% 0.20 285 / .15)',color:'var(--primary)',
          borderRadius:4,border:'1px solid oklch(60% 0.20 285 / .25)',textTransform:'uppercase',
        }}>Enterprise</span>
      </div>

      {/* Solution tabs */}
      <div style={{display:'flex',alignItems:'center',gap:2,padding:'0 12px',height:'100%'}}>
        {[{name:'AIM GUARD',active:true,color:'var(--primary)'},{name:'AIM ECO',active:false,color:'var(--green)'}].map(t=>(
          <div key={t.name} style={{
            display:'flex',alignItems:'center',gap:7,padding:'0 14px',height:'100%',
            borderBottom:`2px solid ${t.active?t.color:'transparent'}`,
            cursor:'pointer',
          }}>
            <Dot color={t.active?t.color:'var(--t4)'}/>
            <span style={{fontSize:12,fontWeight:t.active?600:400,color:t.active?'var(--t1)':'var(--t3)',whiteSpace:'nowrap'}}>
              {t.name}
            </span>
            {t.active && (
              <span style={{
                fontSize:10,color:'var(--t3)',background:'var(--s3)',
                padding:'1px 6px',borderRadius:4,fontFamily:'var(--mono)',
              }}>현황 · 프로세스 모드</span>
            )}
            {t.active && (
              <span style={{fontSize:12,color:'var(--t4)',cursor:'pointer',marginLeft:2}}>✕</span>
            )}
          </div>
        ))}
      </div>

      {/* Spacer */}
      <div style={{flex:1}}/>

      {/* Right actions */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'0 16px'}}>
        {/* Undo/Redo */}
        <div style={{display:'flex',gap:1,background:'var(--s2)',borderRadius:7,padding:2,border:'1px solid var(--border)'}}>
          {['↩','↪'].map(ic=>(
            <button key={ic} style={{
              width:28,height:28,borderRadius:5,border:'none',background:'transparent',
              color:'var(--t3)',cursor:'pointer',fontSize:12,fontFamily:'var(--font)',
              display:'flex',alignItems:'center',justifyContent:'center',
            }}>{ic}</button>
          ))}
        </div>

        {/* Notifications */}
        <button style={{
          position:'relative',width:32,height:32,borderRadius:8,
          border:'1px solid var(--border)',background:'transparent',
          cursor:'pointer',color:'var(--t2)',fontSize:14,
          display:'flex',alignItems:'center',justifyContent:'center',
        }}>
          🔔
          <span style={{
            position:'absolute',top:4,right:4,width:7,height:7,borderRadius:'50%',
            background:'var(--red)',border:'1.5px solid var(--s1)',
          }}/>
        </button>

        {/* Save */}
        <button onClick={save} style={{
          display:'flex',alignItems:'center',gap:7,padding:'6px 16px',
          background:saved?'oklch(65% 0.16 145 / .15)':'linear-gradient(135deg,oklch(58% 0.22 285),oklch(52% 0.20 295))',
          border:saved?'1px solid oklch(65% 0.16 145 / .4)':'none',
          borderRadius:8,cursor:'pointer',color:'white',
          fontFamily:'var(--font)',fontSize:12,fontWeight:600,letterSpacing:'0.02em',
          transition:'all .2s',
          boxShadow:saved?'none':'0 2px 12px oklch(55% 0.22 285 / .35)',
        }}>
          {saved ? <><Dot color="var(--green)"/>저장됨</> : <>💾 저장</>}
        </button>

        {/* User */}
        <div style={{
          width:30,height:30,borderRadius:8,
          background:'linear-gradient(135deg,var(--primary),oklch(52% 0.20 295))',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:11,fontWeight:700,cursor:'pointer',
        }}>K</div>
      </div>
    </div>
  );
};

/* ── LEFT PANEL — AI AGENT + NAV ── */
const LeftPanel = () => {
  const [navItem, setNavItem] = useState('map');
  const [messages, setMessages] = useState([
    {role:'ai',text:'안녕하세요! AIMNIS 입니다! 제가 추가하거나 변경하고 싶은 사항을 입력해 주세요.'},
    {role:'user',text:'현재 구역에 카메라 추가해줘. "등록 해 줘"'},
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  const navItems = [
    {id:'map',icon:'▦',label:'Map 대시보드'},
    {id:'campus',icon:'🏢',label:'캠퍼스'},
    {id:'report',icon:'📊',label:'리포트'},
    {id:'rules',icon:'⚙',label:'규칙 관리'},
    {id:'settings',icon:'🔧',label:'설정'},
  ];

  const send = () => {
    if(!input.trim()) return;
    const msg = input.trim();
    setMessages(m=>[...m,{role:'user',text:msg}]);
    setInput('');
    setLoading(true);
    setTimeout(()=>{
      setMessages(m=>[...m,{role:'ai',text:'구역 내 CCTV 카메라 위치를 분석하고 있습니다. 최적 배치 포인트 3곳을 식별했습니다. 맵에 마커를 추가할까요?'}]);
      setLoading(false);
    },1200);
  };

  useEffect(()=>{
    if(bottomRef.current) bottomRef.current.scrollTop = bottomRef.current.scrollHeight;
  },[messages,loading]);

  return (
    <div style={{
      width:200,flexShrink:0,display:'flex',flexDirection:'column',
      background:'var(--s1)',borderRight:'1px solid var(--border)',
      position:'relative',zIndex:5,height:'100%',
    }}>
      {/* Nav section */}
      <div style={{padding:'12px 0',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <div style={{padding:'0 14px 8px',fontSize:10,fontWeight:700,color:'var(--t4)',letterSpacing:'0.08em',textTransform:'uppercase'}}>
          솔루션 메뉴
        </div>
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>setNavItem(n.id)} style={{
            width:'100%',display:'flex',alignItems:'center',gap:9,
            padding:'9px 14px',border:'none',cursor:'pointer',
            background:navItem===n.id?'oklch(60% 0.20 285 / .10)':'transparent',
            color:navItem===n.id?'var(--t1)':'var(--t3)',
            fontSize:12,fontFamily:'var(--font)',fontWeight:navItem===n.id?600:400,
            borderLeft:`2px solid ${navItem===n.id?'var(--primary)':'transparent'}`,
            transition:'all .15s',textAlign:'left',
          }}>
            <span style={{fontSize:11,width:16,textAlign:'center',flexShrink:0}}>{n.icon}</span>
            {n.label}
          </button>
        ))}
      </div>

      {/* AI Agent chat */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
        {/* Agent header */}
        <div style={{
          padding:'10px 14px',borderBottom:'1px solid var(--border)',flexShrink:0,
          display:'flex',alignItems:'center',justifyContent:'space-between',
        }}>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{
              width:22,height:22,borderRadius:6,
              background:'linear-gradient(135deg,var(--primary),oklch(52% 0.20 295))',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,
            }}>✦</div>
            <span style={{fontSize:11,fontWeight:600,color:'var(--t2)'}}>AI 어시스턴트</span>
          </div>
          <span style={{
            fontSize:9,fontWeight:600,letterSpacing:'0.06em',padding:'2px 6px',
            background:'oklch(65% 0.16 145 / .12)',color:'var(--green)',
            borderRadius:4,border:'1px solid oklch(65% 0.16 145 / .3)',textTransform:'uppercase',
          }}>활성</span>
        </div>

        {/* Messages */}
        <div ref={bottomRef} style={{flex:1,overflowY:'auto',padding:'12px 12px 8px',display:'flex',flexDirection:'column',gap:10}}>
          {messages.map((m,i)=>(
            <div key={i} style={{
              display:'flex',flexDirection:'column',
              alignItems:m.role==='user'?'flex-end':'flex-start',
              animation:'slideIn .25s ease both',
            }}>
              {m.role==='ai' && (
                <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:4}}>
                  <div style={{
                    width:14,height:14,borderRadius:4,
                    background:'linear-gradient(135deg,var(--primary),oklch(52% 0.20 295))',
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,flexShrink:0,
                  }}>✦</div>
                  <span style={{fontSize:9,color:'var(--t4)',fontWeight:600}}>AIMNIS</span>
                </div>
              )}
              <div style={{
                maxWidth:'85%',padding:'9px 11px',borderRadius:10,
                background:m.role==='user'
                  ?'oklch(60% 0.20 285 / .2)'
                  :'var(--s3)',
                border:`1px solid ${m.role==='user'?'oklch(60% 0.20 285 / .35)':'var(--border)'}`,
                fontSize:11,lineHeight:1.6,color:'var(--t2)',
                borderBottomRightRadius:m.role==='user'?2:10,
                borderBottomLeftRadius:m.role==='ai'?2:10,
              }}>{m.text}</div>
            </div>
          ))}
          {loading && (
            <div style={{display:'flex',alignItems:'center',gap:5}}>
              <div style={{
                width:14,height:14,borderRadius:4,
                background:'linear-gradient(135deg,var(--primary),oklch(52% 0.20 295))',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,flexShrink:0,
              }}>✦</div>
              <div style={{display:'flex',gap:3,padding:'8px 10px',background:'var(--s3)',borderRadius:10,border:'1px solid var(--border)'}}>
                {[0,1,2].map(i=>(
                  <div key={i} style={{
                    width:5,height:5,borderRadius:'50%',background:'var(--primary)',
                    animation:`pulse 1.2s ease ${i*0.2}s infinite`,
                  }}/>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Suggestion chips */}
        <div style={{padding:'0 10px 8px',display:'flex',flexWrap:'wrap',gap:5,flexShrink:0}}>
          {['카메라 추가','구역 설정','알람 분석'].map(chip=>(
            <button key={chip} onClick={()=>setInput(chip)} style={{
              fontSize:10,padding:'4px 9px',borderRadius:12,border:'1px solid var(--border2)',
              background:'var(--s2)',color:'var(--t3)',cursor:'pointer',fontFamily:'var(--font)',
              transition:'all .15s',
            }}>{chip}</button>
          ))}
        </div>

        {/* Input */}
        <div style={{
          padding:'8px 10px 10px',borderTop:'1px solid var(--border)',flexShrink:0,
          display:'flex',gap:6,alignItems:'flex-end',
        }}>
          <textarea
            value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="명령을 입력하세요..."
            style={{
              flex:1,resize:'none',background:'var(--s2)',border:'1px solid var(--border2)',
              borderRadius:8,padding:'8px 10px',color:'var(--t1)',fontSize:11,
              fontFamily:'var(--font)',lineHeight:1.5,outline:'none',minHeight:36,maxHeight:80,
            }}
          />
          <button onClick={send} style={{
            width:32,height:32,borderRadius:8,border:'none',cursor:'pointer',
            background:input.length>0?'linear-gradient(135deg,var(--primary),oklch(52% 0.20 295))':'var(--s3)',
            color:'white',fontSize:13,transition:'all .2s',flexShrink:0,
            boxShadow:input.length>0?'0 2px 10px oklch(55% 0.22 285 / .35)':'none',
          }}>↑</button>
        </div>
      </div>
    </div>
  );
};

/* ── CENTER — MAP CANVAS ──── */
const MapCanvas = ({showGrid}) => {
  const [zoom, setZoom] = useState(94);
  const [viewMode, setViewMode] = useState('위성');
  const [selectedMarker, setSelectedMarker] = useState(null);

  const alarms = [
    {id:'A1',x:'28%',y:'38%',type:'CRITICAL',label:'Zone 7'},
    {id:'A2',x:'55%',y:'25%',type:'HIGH',label:'출입-A'},
    {id:'A3',x:'70%',y:'60%',type:'MEDIUM',label:'Sensor-1'},
    {id:'A4',x:'42%',y:'65%',type:'LOW',label:'ADAM-1'},
  ];

  const cameras = [
    {id:'C1',x:'35%',y:'45%',label:'CAM-4-33'},
    {id:'C2',x:'62%',y:'40%',label:'CAM-B-21'},
    {id:'C3',x:'48%',y:'58%',label:'CAM-R-12'},
  ];

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',background:'var(--bg)',minWidth:0}}>
      {/* Canvas toolbar */}
      <div style={{
        height:40,display:'flex',alignItems:'center',gap:8,padding:'0 14px',
        background:'var(--s1)',borderBottom:'1px solid var(--border)',flexShrink:0,
        justifyContent:'space-between',
      }}>
        {/* Left: breadcrumb */}
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--t3)'}}>
          <span>AIM GUARD</span>
          <span style={{color:'var(--t4)'}}>›</span>
          <span style={{color:'var(--t1)',fontWeight:600}}>Map 대시보드</span>
          <span style={{color:'var(--t4)'}}>›</span>
          <span>캠퍼스 A</span>
        </div>

        {/* Center: view mode */}
        <div style={{display:'flex',gap:2,background:'var(--s2)',borderRadius:7,padding:2,border:'1px solid var(--border)'}}>
          {['위성','지도','레이어'].map(m=>(
            <button key={m} onClick={()=>setViewMode(m)} style={{
              padding:'4px 12px',borderRadius:5,border:'none',cursor:'pointer',
              background:viewMode===m?'var(--s4)':'transparent',
              color:viewMode===m?'var(--t1)':'var(--t3)',
              fontSize:11,fontFamily:'var(--font)',fontWeight:viewMode===m?600:400,transition:'all .15s',
            }}>{m}</button>
          ))}
        </div>

        {/* Right: controls */}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {/* Zoom */}
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <button onClick={()=>setZoom(z=>Math.max(10,z-10))} style={{
              width:22,height:22,borderRadius:5,border:'1px solid var(--border)',
              background:'var(--s2)',color:'var(--t2)',cursor:'pointer',fontSize:14,
              display:'flex',alignItems:'center',justifyContent:'center',
            }}>−</button>
            <span style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--t2)',minWidth:36,textAlign:'center'}}>{zoom}%</span>
            <button onClick={()=>setZoom(z=>Math.min(200,z+10))} style={{
              width:22,height:22,borderRadius:5,border:'1px solid var(--border)',
              background:'var(--s2)',color:'var(--t2)',cursor:'pointer',fontSize:14,
              display:'flex',alignItems:'center',justifyContent:'center',
            }}>+</button>
          </div>

          {/* Layer toggles */}
          {['알람','CCTV','구역'].map(l=>(
            <button key={l} style={{
              fontSize:11,padding:'4px 10px',borderRadius:6,border:'1px solid var(--border)',
              background:'var(--s2)',color:'var(--t2)',cursor:'pointer',fontFamily:'var(--font)',
              transition:'all .15s',
            }}>{l}</button>
          ))}

          <button style={{
            fontSize:11,padding:'4px 10px',borderRadius:6,
            border:'1px solid oklch(60% 0.20 285 / .4)',
            background:'oklch(60% 0.20 285 / .1)',color:'var(--primary)',cursor:'pointer',
            fontFamily:'var(--font)',fontWeight:600,
          }}>내보내기</button>
        </div>
      </div>

      {/* Map area */}
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {/* Satellite map placeholder */}
        <div style={{
          position:'absolute',inset:0,

/* ── APP ─────────────────── */
const App = () => {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    document.documentElement.style.setProperty('--primary', `oklch(60% 0.20 ${tweaks.accentHue})`);
  }, [tweaks.accentHue]);

  useEffect(() => {
    const handler = e => {
      if(e.data?.type==='__activate_edit_mode') setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      {/* noise overlay */}
      <div style={{position:'fixed',inset:0,zIndex:0,pointerEvents:'none',opacity:.03,
        backgroundImage:'url("data:image/svg+xml,%3Csvg viewBox=\'0 0 256 256\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'n\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.9\' numOctaves=\'4\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23n)\'/%3E%3C/svg%3E")',
        backgroundSize:'128px 128px',
      }}/>

      <TopBar/>
      <div style={{flex:1,display:'flex',minHeight:0,position:'relative',zIndex:1}}>
        <LeftPanel/>
        <MapCanvas showGrid={tweaks.showGrid}/>
        <RightPanel tweaks={tweaks} setTweaks={setTweaks}/>
      </div>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksOpen}/>

      {/* Nav back to main */}
      <a href="AIMNIS Redesign.html" style={{
        position:'fixed',bottom:16,left:220,zIndex:9999,
        fontSize:10,color:'var(--t4)',textDecoration:'none',
        padding:'5px 10px',background:'var(--s2)',
        border:'1px solid var(--border)',borderRadius:6,
        fontFamily:'var(--mono)',
      }}>← 메인으로</a>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
